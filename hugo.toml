baseURL = 'https://bezvoda.site/'
languageCode = 'en-us'
title = "Radek's Feed"
theme = 'PaperMod'

[params]
    defaultTheme = "auto" # switches between dark/light based on OS
    showFullTextContent = true # This is key for your "Feed" style
    displayFullContents = true
    mainSections = ["posts", "micro"]
    author = "Radek Bezvoda"
    showLastMod = true
    ShowLastMod = true

    [params.homeInfoParams]
        Title = "Hi there"
        Content = "Welcome to my stream of thoughts. Short notes, occasional long reads."


[[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 5 # Lower number moves it to the left
[outputs]
    home = ["HTML", "RSS", "JSON"]

[frontmatter]
    # This tells Hugo the order of priority for dates
    lastmod = [":git", "lastmod", ":fileModTime", "publishDate"]